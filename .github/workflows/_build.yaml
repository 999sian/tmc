name: _build

on:
  workflow_call:
    inputs:
      publish_mode:
        description: "artifact for CI artifacts, release for tag artifacts"
        required: true
        type: string
      version_label:
        description: "Date+SHA label (CI) or tag name (release)"
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.region }} on ${{ matrix.os_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Use Ubuntu 22.04 (glibc 2.35) so the Linux binary runs on
          # older distros — Nobara 43, Fedora 43, Kubuntu 25.10. Building
          # on ubuntu-latest pins glibc 2.43+ which excludes most users.
          - runner: ubuntu-22.04
            os_name: linux
            region: usa
            flag: --usa
            exe_name: tmc_pc
            extractor_name: asset_extractor
          - runner: windows-latest
            os_name: windows
            region: usa
            flag: --usa
            exe_name: tmc_pc.exe
            extractor_name: asset_extractor.exe
          - runner: macos-latest
            os_name: macos
            region: usa
            flag: --usa
            exe_name: tmc_pc
            extractor_name: asset_extractor
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl libpng-dev libfmt-dev nlohmann-json3-dev \
            libx11-dev libxext-dev libxrender-dev libxcursor-dev \
            xutils-dev xorg-dev autoconf automake libtool meson ninja-build

      - name: Install macOS dependencies
        if: matrix.os_name == 'macos'
        run: |
          brew update
          brew install pkg-config fmt nlohmann-json libpng libomp ninja

      - name: Install MinGW Windows
        if: matrix.os_name == 'windows'
        shell: powershell
        run: |
          choco install mingw -y --no-progress

          $candidates = @(
            "C:\ProgramData\mingw64\mingw64\bin",
            "C:\ProgramData\mingw64\bin",
            "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\mingw64\bin",
            "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin",
            "C:\tools\mingw64\bin"
          )

          $mingw = $null
          foreach ($path in $candidates) {
            if (Test-Path "$path\gcc.exe") {
              $mingw = $path
              break
            }
          }

          if ($null -eq $mingw) {
            Write-Host "Known MinGW paths not found, searching gcc.exe..."
            $gcc = Get-ChildItem -Path "C:\ProgramData" -Filter gcc.exe -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "mingw.*\\bin\\gcc\.exe$" } |
              Select-Object -First 1

            if ($null -ne $gcc) {
              $mingw = Split-Path $gcc.FullName
            }
          }

          if ($null -eq $mingw) {
            Write-Error "MinGW gcc.exe not found"
            exit 1
          }

          Write-Host "Using MinGW from: $mingw"
          echo $mingw | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$mingw;$env:PATH"

          gcc --version
          g++ --version

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Configure xmake (no ROM needed for binaries)
        shell: bash
        env:
          TMC_XMAKE_TOOLCHAIN: ${{ matrix.os_name == 'windows' && 'mingw' || '' }}
        run: |
          GAME_VERSION=$([ "${{ matrix.region }}" = "eur" ] && echo "EU" || echo "USA")
          if [ -n "$TMC_XMAKE_TOOLCHAIN" ]; then
            xmake f -y --game_version="$GAME_VERSION" --toolchain="$TMC_XMAKE_TOOLCHAIN"
          else
            xmake f -y --game_version="$GAME_VERSION"
          fi

      - name: Build tmc_pc and asset_extractor
        shell: bash
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          xmake build -y tmc_pc
          xmake build -y asset_extractor

      - name: Prepare artifact payload
        shell: bash
        run: |
          BIN_PATH="build/pc/${{ matrix.exe_name }}"
          EXTRACTOR_PATH="build/pc/${{ matrix.extractor_name }}"
          test -f "$BIN_PATH"
          test -f "$EXTRACTOR_PATH"

          OUTDIR="artifact"
          mkdir -p "$OUTDIR"
          cp "$BIN_PATH" "$OUTDIR/${{ matrix.exe_name }}"
          cp "$EXTRACTOR_PATH" "$OUTDIR/${{ matrix.extractor_name }}"
          if [ -f "assets/sounds.json" ]; then
            cp assets/sounds.json "$OUTDIR/sounds.json"
          fi

          # Linux: bundle libSDL3 + libgomp so Steam Deck (and any distro
          # without SDL3 yet) can launch the binary. The build links with
          # -Wl,-rpath,$ORIGIN so the runtime finds them next to tmc_pc.
          if [ "${{ matrix.os_name }}" = "linux" ]; then
            for lib in libSDL3.so.0 libgomp.so.1; do
              src="$(ldd "$BIN_PATH" 2>/dev/null | awk -v l="$lib" '$1==l{print $3}')"
              if [ -n "$src" ] && [ -f "$src" ]; then
                cp -aP "$src" "$OUTDIR/"
                # Also copy the resolved versioned file (e.g. libSDL3.so.0.4.4)
                resolved="$(readlink -f "$src")"
                if [ "$resolved" != "$src" ] && [ -f "$resolved" ]; then
                  cp -aP "$resolved" "$OUTDIR/"
                fi
              fi
            done
          fi

          # macOS: bundle SDL3 + libomp via install_name_tool so the binary
          # finds them next to itself. Apple's loader uses @executable_path,
          # not $ORIGIN. xmake's libsdl3 package builds a static archive so
          # it should already be inside tmc_pc; libomp from brew is the only
          # dylib we expect to need bundling.
          if [ "${{ matrix.os_name }}" = "macos" ]; then
            mkdir -p "$OUTDIR"
            for lib in $(otool -L "$BIN_PATH" | awk 'NR>1 {print $1}' | grep -E "(libomp|libSDL3|libpng|libfmt)" || true); do
              if [ -f "$lib" ]; then
                base="$(basename "$lib")"
                cp -a "$lib" "$OUTDIR/$base"
                chmod u+w "$OUTDIR/$base"
                install_name_tool -id "@executable_path/$base" "$OUTDIR/$base" || true
                install_name_tool -change "$lib" "@executable_path/$base" "$OUTDIR/${{ matrix.exe_name }}" || true
              fi
            done
          fi

      - name: Create archive
        shell: bash
        run: |
          ARCHIVE_BASE="tmc-${{ matrix.region }}-${{ matrix.os_name }}-${{ inputs.version_label }}"
          tar -czf "${ARCHIVE_BASE}.tar.gz" -C artifact .
          echo "archive_name=${ARCHIVE_BASE}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.archive_name }}
          path: ${{ env.archive_name }}
          if-no-files-found: error
